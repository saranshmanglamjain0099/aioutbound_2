version: '3.8'

services:
  outboundai:
    build: .
    ports:
      - "8000:8000"
    # In production (Coolify/VPS): set env vars directly in the platform.
    # For local dev only: copy .env.example to .env and fill in your keys.
    env_file:
      - path: .env
        required: false   # Does NOT fail if .env is absent (production safe)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
